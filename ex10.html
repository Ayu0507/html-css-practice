<!DOCTYPE html>
<html>
  <head>
    <title>DIV</title>
    <style>
      .red{
width:50px;
height:50px;
background-color: red;
      }
      .green{
        width:50px;
height:50px;
background-color: green;
border-radius: 30px;
margin-top: 10px;
      }
      .install{
        font-weight: bold;
        font-size: x-large;
        color: white;
        background-color: rgb(48, 46, 46);
        width:270px;
        height:70px;
      }
      span{
font-weight: lighter;
        font-size: small;
        color: white;
        background-color: rgb(48, 46, 46);
        display: block;
        margin-top: 5px;
      }
      .cat{
width:25px;
height:25px;
border-radius:50px;
margin-top: 15px;
display: inline-block;
}
.happen{
  border:none;
margin-top:0px;
display: inline-block;

}
.tweet{
  background-color: rgb(58, 58, 240);
color:white;
border:none;
border-radius:15px;
font-size:10px;
height:20px;
width:60px;
display: inline-block;
}
.twitter{
  box-shadow: 2px 5px 10px rgba(0,0,0.3);
  width: 300px;
  height: 50px;
  border:none;
  border-radius: 10px;
  margin-bottom: 20px;
}
.oliver{
  width:100px;
  height:100px;
  margin-bottom: 0px;
  
}
.name{
  font-weight: bold;
  font-size: medium;
 
}
.friend{
  color: grey;
}
.friends{
  background-color: blue;
  color: white;
  width:100px;
  height:30px;
  border: none;
  border-radius: 5px;
 
}
.Oliver{
  height:200px;
 line-height: 8px;
  display: inline-block;
}
.url{
  transition:box-shadow ;
  width:250px;
  height:20px;
  box-shadow: 0 0 8px 2px rgba(0, 0, 0, 0.2);
  border:none;
  border-radius:9px;
  margin-top: 10px;
}
.logo{
  width:200px;
height:40px ;
object-position: center;
display: block;

}
.lucky,.search{
  width:150px;
  height:20px;
  background-color:rgb(233, 230, 230);
  display: inline-block;
  text-align: center;
  padding-top: 5px;
  margin-right: 8px;
}

    </style>
  </head>
  <body>
    <div class="red"></div>
    <div class="green"></div>
    <div>
      <p class="service">Stisfied with your service?</p>
      <button>Yse</button>
      <button>No</button>
    </div>
    <div>
      <p class="install">Install YouTube Music <span>Add YouTube Music to your desktop for quick and easy acess </span></p>
     
    </div>
    <div class="twitter">
      <image class="cat" src="cat.webp"></image>
       <input class="happen" type="text" placeholder="What's happening?">
     <button class="tweet">Tweet</button>
    </div>
    <div class="Oliver">
      <image class="oliver" src="cat.webp"></image>
      <p class="name">Oliver</p>
      <p class="friend">2 mutual friends</p>
      <button class="friends">Add Friend</button>
      </div>
      <div class="Oliver">
      <image class="oliver" src="oliver.webp"></image>
      <p class="name">Mimi</p>
      <p class="friend">3 mutual friends</p>
      <button class="friends">Add Friend</button>
     </div>
     <div class="Oliver">
      <image class="oliver" src="kitten.webp"></image>
      <p class="name">Rex</p>
      <p class="friend">4 mutual friends</p>
      <button class="friends">Add Friend</button>
      
    </div>
    <div>
      <center>
    <image class="logo" src="LOGO.webp"></image>
     <input type="text" placeholder="Search Google or type a URL" class="url"><br>
     <p class="search">Google Search</p>
     <p class="lucky">i'm Feeling Lucky</p>
     </center>
      </div>
  </body>
</html>
