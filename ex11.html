<!DOCTYPE html>
<html>
  <head>
    <title>CSS Grid</title>
  </head>
  <body>
    <div style="
      display: grid;
      grid-template-columns: 200px 75px;">
      <p style="background-color: aqua;">200px</p>
      <p style="background-color: palevioletred;">75px</p>
    </div>
    <div style="
    display: grid;
    grid-template-columns: 50px 1fr 50px;">
    <p style="background-color: aqua;">col1</p>
    <p style="background-color: rgb(243, 161, 206)";>col2</p>
    <p style="background-color: aqua;">col3</p>
    </div>
    <div style="
    display: grid;
    grid-template-columns:200px 200px 200px 200px; 
    column-gap: 20px;
    row-gap: 10px;">
      <p style="background-color: aquamarine;">col1</p>
      <p style="background-color: aquamarine;">col2</p>
      <p style="background-color: aquamarine;">col3</p>
      <p style="background-color: aquamarine;">col4</p>
      <p style="background-color: aquamarine;">col1</p>
      <p style="background-color: aquamarine;">col2</p>
      <p style="background-color: aquamarine;">col3</p>
      <p style="background-color: aquamarine;">col4</p>
    </div>
    <hr>
    <div style="
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    column-gap: 10px;">
       <p style="background-color: aquamarine;">col1</p>
      <p style="background-color: aquamarine;">col2</p>
      <p style="background-color: aquamarine;">col3</p>
      <p style="background-color: aquamarine;">col4</p>
      <p style="background-color: aquamarine;">col1</p>
      <p style="background-color: aquamarine;">col2</p>
      <p style="background-color: aquamarine;">col3</p>
      <p style="background-color: aquamarine;">col4</p>
    </div>
    
  </body>
</html>
