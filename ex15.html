<!DOCTYPE html>
<html>
  <head>
    <title>Position Absolute and Relative</title>
  </head>
  <body>
    
      <div style="
      width: 200px;
      height:200px;
      background-color: grey;
      position:fixed;
      bottom: 10px;
      right:10px;
      ">
      <div style="
      background-color: black;
      color: white;
      position: absolute;
      border-radius: 15px;
      font-family: arial;
      padding-bottom: 6px;
      padding-top: 6px;
      padding-left: 9px;
      padding-right:9px ;
      left:-8px;
      top:-8px;
      font-size: small;">X
      </div>
      <div style="
      background-color: black;
      color: white;
      position: absolute;
      font-family: arial;
      padding-bottom: 6px;
      padding-top: 6px;
      padding-left: 9px;
      padding-right:9px ;
      right:8px;
      bottom:10px;
      font-size: small;">0:29</div>
    </div>

      <div
      style="
      height:1000px;"></div>

      <hr>

      <div style="position: relative;
      width:250px;">
        <img src="t-shirt.webp">
        <div style="
       background-color: black;
      color: white;
      position: absolute;
      font-family: arial;
      padding-bottom: 6px;
      padding-top: 6px;
      padding-left: 9px;
      padding-right:9px ;
      right:10px;
      top:0px;
      font-size: small; ">
      20% OFF
        </div>
        <div  style="
        position: absolute;
        background-color: white;
        left:72px;
        bottom:70px;
        padding-bottom: 6px;
      padding-top: 6px;
      padding-left: 9px;
      padding-right:9px ;
      border-color: black;
      border-style: solid;
      border-radius: 4px;
     border-width: 2px;
        ">
          Add to Cart
        </div>
      </div>
  </body>
</html>
