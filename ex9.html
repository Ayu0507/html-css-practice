<!DOCTYPE html>
<html>
  <head>
    <title>Display Block</title>
    <style>
      input{
        display:block;
        margin-bottom: 10px;
      }
      p{
        width:180px;
        font-size: small;
        display: inline-block;
        margin-top: 10px;
      }
      .url{
  transition:box-shadow ;
  width:250px;
  box-shadow: 0 0 8px 2px rgba(0, 0, 0, 0.2);
  border:none;
  border-radius:9px;
  
}
.logo{
  width:100px;
height:40px ;
object-position: center;
}
.first,
.last{
  display:inline-block
}
.signup{
  background-color: blue;
  color: white;
  width:200px;
  height:30px;
display: block;
border:none;
border-radius: 8px;
}

.now{
  display: block;
  background-color: black;
  color: white;
  width:100px;
  height:25px;
  border:none;
}
.now,.later{
  display: inline-block;
}
i{
  font-size: xx-large;
}
.location{
  margin-top: 30px;
}
.later{
  margin-left: 10px;
  width: 150px;
  height:25px;
  background-color: rgb(198, 196, 196);
  border:none;
}
    </style>
  </head>
  <body>
    <input type="text" placeholder="Name">
    <input type="text" placeholder="Email">
    <br>
    <p>Thanks for chatting with our customer support. Would you like to take our quick survey?</p>
    <button>Yes</button>
    <button>No</button><br>
    <image class="logo" src="LOGO.webp"></image>
     <input type="text" placeholder="Search Google or type a URL" class="url"><br><hr>
     <input class="first" type="text" placeholder="First name">
     <input class="last" type="text" placeholder="Last name">
      <input class="email" type="text" placeholder="Email">
     <button class="signup">Sign Up</button>
     <hr>
     <i>Request a ride now</i>
      <input class="location" type="text" placeholder="Enter pickup location">
       <input class="destination" type="text" placeholder="Enter destination"><br>
       <button class="now">Request now</button>
        <button class="later">Schedule for later</buttonclass>
      </body>
</html>
